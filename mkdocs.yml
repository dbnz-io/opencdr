site_name: OpenCDR
site_description: Open-source Cloud Detection & Response for AWS
site_url: https://opencdr.readthedocs.io
repo_url: https://github.com/dbnz-io/opencdr-internal
repo_name: dbnz-io/opencdr-internal
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting Started:
    - Prerequisites: getting-started.md
    - Deployment: deployment.md
  - Detection Rules:
    - Built-in Rules: detection-rules.md
    - Writing Rules: writing-rules.md
  - Features:
    - Incident Response: incident-response.md
    - Notifications: notifications.md
    - REST API: api.md
    - CLI: cli.md
  - Development:
    - Testing: testing.md
    - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
